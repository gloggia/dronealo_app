<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#004AAD" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Dronealo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <script src="js/auth-demo.js"></script>
    <script src="js/auth-gate.js"></script>
    <div class="app-shell">
    <div class="app-root">
      <header class="app-top">
        <a href="index.html" class="brand brand--compact" aria-label="Dronealo inicio">
          <img
            class="brand-mark"
            src="assets/logo-isotipo.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
          <span class="brand-wordmark" aria-hidden="true">
            <span class="brand-wordmark__blue">DRONE</span><span class="brand-wordmark__orange">ALO</span>
          </span>
        </a>
      </header>

      <main class="app-main">
        <p class="home-hello">Hola</p>
        <h2 class="home-title">¿Estás listo para dronear?</h2>

        <div class="hero-card">
          <p>Ingresa los datos y publica el proyecto.</p>
          <a class="btn btn-primary btn-block" href="elegir-categoria.html">Dronea ahora</a>
        </div>

        <p class="section-label">Actividad reciente</p>
        <div class="order-preview">
          <div class="row">
            <span class="id">Pedido DA-72M91</span>
            <span class="status">Entregado</span>
          </div>
          <p class="meta">Fotografía aérea · Zona norte · Hace 5 días</p>
          <a class="link" href="pedidos.html">Ver mis pedidos</a>
        </div>
      </main>
    </div>

      <nav class="tab-bar" aria-label="Principal">
        <a class="active" href="index.html"><span class="ti" aria-hidden="true">⌂</span>Inicio</a>
        <a href="servicios.html"><span class="ti" aria-hidden="true">☰</span>Servicios</a>
        <a href="pedidos.html"><span class="ti" aria-hidden="true">◫</span>Pedidos</a>
        <a href="perfil.html"><span class="ti" aria-hidden="true">○</span>Perfil</a>
      </nav>
    </div>
    <script>
      (function () {
        var A = window.DronealoAuthDemo;
        if (!A) return;
        var s = A.getSession();
        var el = document.querySelector(".home-hello");
        if (el && s && s.nombre) {
          var first = (s.nombre || "").split(/\s+/)[0];
          el.textContent = first ? "Hola, " + first : "Hola";
        }
      })();
    </script>
  </body>
</html>
